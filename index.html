<meta charset="UTF-8">

<style>

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #F7F7FB;
  color: #1F2937;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

.app {
  max-width: 860px;
  margin: 0 auto;
  padding: 20px 24px 24px;
}

.emoji {
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji", sans-serif;
  font-style: normal;
  font-weight: normal;
  line-height: 1;
}

.header {
  text-align: center;
  margin-bottom: 20px;
}

.header-title {
  font-size: 22px;
  font-weight: 700;
  color: #4C1D95;
  letter-spacing: -0.3px;
}

.header-meta {
  font-size: 12px;
  font-weight: 600;
  color: #8B5CF6;
  margin-top: 4px;
}

.header-hint {
  font-size: 11px;
  color: #9CA3AF;
  margin-top: 4px;
}

.header-line {
  width: 40px;
  height: 3px;
  background: linear-gradient(90deg, #7C3AED, #A855F7);
  border-radius: 2px;
  margin: 10px auto 0;
}

.timeline {
  position: relative;
}

.section {
  position: relative;
  padding-left: 52px;
  padding-bottom: 6px;
}

.section:last-child { padding-bottom: 0; }

.section::before {
  content: '';
  position: absolute;
  left: 17px;
  top: 40px;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, #DDD6FE, #EDE9FE);
}

.section:last-child::before { display: none; }

.section-num {
  position: absolute;
  left: 0;
  top: 2px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: #FFFFFF;
  z-index: 1;
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s ease;
}

.section.open .section-num {
  transform: scale(1.12);
}

.section-header {
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  padding: 5px 0 6px;
  user-select: none;
  -webkit-user-select: none;
}

.section-header:hover .section-title { color: #4C1D95; }

.section-info { flex: 1; }

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: #1F2937;
  text-transform: uppercase;
  letter-spacing: 0.2px;
  line-height: 1.4;
  transition: color 0.2s ease;
}

.section-title .emoji {
  margin-right: 5px;
  font-size: 14px;
  vertical-align: middle;
}

.section-desc {
  font-size: 12px;
  color: #6B7280;
  line-height: 1.6;
  margin-top: 6px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: max-height 0.35s ease, opacity 0.3s ease, margin 0.3s ease;
}

.section.open .section-desc {
  max-height: 120px;
  opacity: 1;
}

.section-badges {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.badge {
  display: inline-flex;
  align-items: center;
  font-size: 9px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 100px;
  letter-spacing: 0.3px;
}

.badge-code {
  color: #7C3AED;
  background: #F3F0FF;
  border: 1px solid #E8E5F0;
}

.badge-count {
  color: #6B7280;
  background: #F3F4F6;
  border: 1px solid #E5E7EB;
}

.section-chevron {
  width: 20px;
  height: 20px;
  flex-shrink: 0;
  margin-top: 2px;
  color: #C4B5FD;
  transition: transform 0.35s ease, color 0.25s ease;
}

.section.open .section-chevron {
  transform: rotate(180deg);
  color: #7C3AED;
}

.section-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

.cards-label {
  font-size: 10px;
  font-weight: 700;
  color: #9CA3AF;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 14px 0 8px;
}

.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.card {
  background: #FFFFFF;
  border: 1px solid #EEECF5;
  border-radius: 12px;
  padding: 14px;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(124, 58, 237, 0.1);
  border-color: #DDD6FE;
}

.card-icon {
  width: 34px;
  height: 34px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.card-name {
  font-size: 12px;
  font-weight: 600;
  color: #374151;
  line-height: 1.45;
}

@media (max-width: 680px) {
  .app { padding: 16px 16px 20px; }
  .header-title { font-size: 18px; }
  .section { padding-left: 44px; }
  .section-num { width: 32px; height: 32px; font-size: 12px; }
  .section::before { left: 15px; top: 36px; }
  .section-title { font-size: 12px; }
  .cards-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (max-width: 400px) {
  .cards-grid { grid-template-columns: 1fr; }
  .section { padding-left: 38px; }
  .section-num { width: 28px; height: 28px; font-size: 11px; }
  .section::before { left: 13px; top: 32px; }
}

</style>

  function buildTimeline() {
    var tl = document.getElementById("timeline");
    if (!tl) return;

    for (var i = 0; i < modules.length; i++) {
      var mod = modules[i];

      var section = document.createElement("div");
      section.className = "section";

      var num = document.createElement("div");
      num.className = "section-num";
      num.style.background = "linear-gradient(135deg, " + mod.color + ", " + lighten(mod.color) + ")";
      num.style.boxShadow = "0 3px 10px " + mod.color + "33";
      num.textContent = mod.id < 10 ? "0" + mod.id : "" + mod.id;
      section.appendChild(num);

      var header = document.createElement("div");
      header.className = "section-header";

      var info = document.createElement("div");
      info.className = "section-info";

      var title = document.createElement("div");
      title.className = "section-title";
      var emojiSpan = document.createElement("span");
      emojiSpan.className = "emoji";
      emojiSpan.textContent = mod.emoji;
      title.appendChild(emojiSpan);
      title.appendChild(document.createTextNode(mod.name));
      info.appendChild(title);

      var badges = document.createElement("div");
      badges.className = "section-badges";

      var codeBadge = document.createElement("span");
      codeBadge.className = "badge badge-code";
      codeBadge.textContent = mod.code;
      badges.appendChild(codeBadge);

      if (mod.topics.length > 0) {
        var countBadge = document.createElement("span");
        countBadge.className = "badge badge-count";
        countBadge.textContent = mod.topics.length + " " + topicWord(mod.topics.length);
        badges.appendChild(countBadge);
      }

      info.appendChild(badges);

      var desc = document.createElement("div");
      desc.className = "section-desc";
      desc.textContent = mod.desc;
      info.appendChild(desc);

      header.appendChild(info);

      var chev = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      chev.setAttribute("class", "section-chevron");
      chev.setAttribute("viewBox", "0 0 24 24");
      chev.setAttribute("fill", "none");
      chev.setAttribute("stroke", "currentColor");
      chev.setAttribute("stroke-width", "2.5");
      chev.setAttribute("stroke-linecap", "round");
      chev.setAttribute("stroke-linejoin", "round");
      var poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
      poly.setAttribute("points", "6 9 12 15 18 9");
      chev.appendChild(poly);
      header.appendChild(chev);

      section.appendChild(header);

      if (mod.topics.length > 0) {
        var content = document.createElement("div");
        content.className = "section-content";

        var label = document.createElement("div");
        label.className = "cards-label";
        label.textContent = "Содержание модуля";
        content.appendChild(label);

        var grid = document.createElement("div");
        grid.className = "cards-grid";

        for (var j = 0; j < mod.topics.length; j++) {
          var topicData = mod.topics[j];

          var card = document.createElement("div");
          card.className = "card";

          var iconBox = document.createElement("div");
          iconBox.className = "card-icon emoji";
          iconBox.style.background = mod.colorLight;
          iconBox.textContent = topicData.emoji;
          card.appendChild(iconBox);

          var cardName = document.createElement("div");
          cardName.className = "card-name";
          cardName.textContent = topicData.text;
          card.appendChild(cardName);

          grid.appendChild(card);
        }

        content.appendChild(grid);
        section.appendChild(content);
      }

      header.addEventListener("click", makeToggle(section));
      tl.appendChild(section);
    }
  }

  function makeToggle(sec) {
    return function() {
      var wasOpen = sec.classList.contains("open");
      var cont = sec.querySelector(".section-content");
      var allSections = document.querySelectorAll(".section");

      for (var k = 0; k < allSections.length; k++) {
        allSections[k].classList.remove("open");
        var c = allSections[k].querySelector(".section-content");
        if (c) c.style.maxHeight = "0px";
      }

      if (!wasOpen && cont) {
        sec.classList.add("open");
        cont.style.maxHeight = cont.scrollHeight + "px";
        setTimeout(function() {
          sec.scrollIntoView({ behavior: "smooth", block: "nearest" });
        }, 120);
      }
    };
  }

  function topicWord(n) {
    if (n === 1) return "тема";
    if (n >= 2 && n <= 4) return "темы";
    return "тем";
  }

  function lighten(hex) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, r + 40);
    g = Math.min(255, g + 40);
    b = Math.min(255, b + 40);
    return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", buildTimeline);
  } else {
    buildTimeline();
  }

})();
</script>
</body>
</html>
